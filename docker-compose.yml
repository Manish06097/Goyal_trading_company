version: "3.9"

networks:
  app_net:
    driver: bridge

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: billinguser
      POSTGRES_PASSWORD: billingpass
      POSTGRES_DB: billingdb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
    test: ["CMD", "pg_isready", "-U", "billinguser", "-d", "billingdb"]
    interval: 5s
    retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # this must match the service name above
      DATABASE_URL: postgresql://billinguser:billingpass@db:5432/billingdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static_images:/app/app/static/images
    ports:
      - "8000:8000"
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  db_data:
  static_images:
