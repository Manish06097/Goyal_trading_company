version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: billinguser
      POSTGRES_PASSWORD: billingpass
      POSTGRES_DB: billingdb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://billinguser:billingpass@db:5432/billingdb
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  db_data:
