version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: billinguser
      POSTGRES_PASSWORD: billingpass
      POSTGRES_DB: billingdb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://billinguser:billingpass@db:5432/billingdb
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  db_data:
